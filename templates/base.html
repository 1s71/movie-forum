<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视剧论坛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Microsoft YaHei', sans-serif; }
        .navbar-brand { font-weight: bold; font-size: 1.4rem; }
        .movie-card { transition: transform 0.3s, box-shadow 0.3s; border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .movie-card:hover { transform: translateY(-6px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
        
        /* 题材专属风格 */
        .genre-badge-comedy    { background: linear-gradient(135deg,#ffd700,#ff6b6b); color:#fff; }
        .genre-badge-romance   { background: linear-gradient(135deg,#ff9a9e,#fecfef); color:#a00; }
        .genre-badge-action    { background: linear-gradient(135deg,#f7971e,#ffd200); color:#333; }
        .genre-badge-sci-fi    { background: linear-gradient(135deg,#4facfe,#00f2fe); color:#fff; }
        .genre-badge-mystery   { background: linear-gradient(135deg,#a18cd1,#fbc2eb); color:#fff; }
        .genre-badge-drama     { background: linear-gradient(135deg,#84fab0,#8fd3f4); color:#333; }
        .genre-badge-animation { background: linear-gradient(135deg,#43e97b,#38f9d7); color:#fff; }
        .genre-badge-horror    { background: linear-gradient(135deg,#434343,#000); color:#ff4444; }
        
        /* 喜剧页面风格 */
        body.genre-comedy    { background: linear-gradient(135deg,#fff9c4,#fce4ec); }
        body.genre-romance   { background: linear-gradient(135deg,#fce4ec,#f8bbd0); }
        body.genre-action    { background: linear-gradient(135deg,#fff3e0,#ffe0b2); }
        body.genre-sci-fi    { background: linear-gradient(135deg,#e3f2fd,#e8eaf6); }
        body.genre-mystery   { background: linear-gradient(135deg,#ede7f6,#d1c4e9); }
        
        .country-btn { border-radius: 20px; margin: 2px; font-size: .85rem; }
        .genre-item  { cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: background .2s; }
        .genre-item:hover, .genre-item.active { background: #e8f4f8; }
        
        footer { background: #212529; color: #aaa; text-align: center; padding: 20px; margin-top: 40px; font-size: .85rem; }
        .poster-placeholder { background: linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.2rem; font-weight:bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand text-warning" href="/">
                <i class="fas fa-film me-2"></i>影视剧论坛
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>首页</a>
                    <a class="nav-link" href="/profile"><i class="fas fa-user me-1"></i>个人中心</a>
                    <a class="nav-link d-none" href="/admin" id="admin-link"><i class="fas fa-shield-alt me-1"></i>管理后台</a>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-warning small d-none" id="welcome-text"></span>
                    <a class="btn btn-outline-light btn-sm" href="/login" id="login-btn">登录</a>
                    <a class="btn btn-warning btn-sm" href="/register" id="register-btn">注册</a>
                    <button class="btn btn-outline-danger btn-sm d-none" id="logout-btn" onclick="logout()">退出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>© 2024 影视剧论坛 &nbsp;|&nbsp; 本站严禁讨论政治内容，违者封号处理</p>
        <p style="font-size:.75rem">内容来源于互联网，仅供交流讨论，请遵守社区规范</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function checkAuth() {
            const token = localStorage.getItem('token');
            const role  = localStorage.getItem('role');
            const username = localStorage.getItem('username');
            if (token) {
                document.getElementById('login-btn').classList.add('d-none');
                document.getElementById('register-btn').classList.add('d-none');
                document.getElementById('logout-btn').classList.remove('d-none');
                document.getElementById('welcome-text').classList.remove('d-none');
                document.getElementById('welcome-text').textContent = `你好，${username || '用户'}`;
                if (role === 'admin') {
                    document.getElementById('admin-link').classList.remove('d-none');
                }
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = '/';
        }

        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
