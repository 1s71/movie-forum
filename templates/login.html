{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-film fa-3x text-warning mb-3"></i>
                    <h3 class="fw-bold">登录账号</h3>
                    <p class="text-muted">登录后享受完整功能</p>
                </div>
                
                <div id="error-msg" class="alert alert-danger d-none"></div>
                
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                            <i class="fas fa-sign-in-alt me-2"></i>登录
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                <div class="text-center text-muted small">
                    还没有账号？ <a href="/register" class="text-primary fw-semibold">立即注册</a>
                </div>
                
                <div class="mt-4 p-3 bg-light rounded">
                    <p class="small text-muted mb-1"><strong>测试账号：</strong></p>
                    <p class="small text-muted mb-0">管理员: <code>admin / 123456</code></p>
                    <p class="small text-muted mb-0">用户: <code>user1 / 123456</code></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const errEl = document.getElementById('error-msg');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>登录中...';
        errEl.classList.add('d-none');
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);
                window.location.href = '/';
            } else {
                errEl.textContent = data.error || '登录失败';
                errEl.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>登录';
            }
        } catch(e) {
            errEl.textContent = '网络错误，请稍后重试';
            errEl.classList.remove('d-none');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>登录';
        }
    });
</script>
{% endblock %}
