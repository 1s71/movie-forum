{% extends "base.html" %}

{% block content %}
<div id="movie-detail">
    <!-- 骨架屏加载提示 -->
    <div id="loading-placeholder" class="text-center py-5">
        <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
        <p class="mt-3 text-muted">加载影视信息中...</p>
    </div>

    <!-- 主体内容（加载后显示） -->
    <div id="main-content" style="display:none">
        <!-- 头部横幅 -->
        <div class="card border-0 mb-4 shadow-sm overflow-hidden" style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:280px;">
            <div class="row g-0">
                <!-- 海报 -->
                <div class="col-md-3 col-sm-4" style="max-width:220px;">
                    <img id="movie-poster" src="" alt="" 
                         style="width:100%;height:100%;min-height:280px;object-fit:cover;"
                         onerror="this.style.background='linear-gradient(135deg,#667eea,#764ba2)';this.src='data:image/svg+xml,<svg/>'">
                </div>
                <!-- 信息 -->
                <div class="col card-body p-4 d-flex flex-column justify-content-between">
                    <div>
                        <h2 id="movie-title" class="fw-bold mb-1"></h2>
                        <p id="movie-meta" class="text-white-50 small mb-3"></p>
                        <!-- 豆瓣评分 -->
                        <div id="score-block" class="d-flex align-items-center gap-3 mb-3">
                            <div class="text-center">
                                <div class="d-flex align-items-baseline gap-1">
                                    <span class="text-warning fw-bold" style="font-size:2.2rem;" id="douban-score">—</span>
                                    <span class="text-warning small">/10</span>
                                </div>
                                <div id="stars-row" class="text-warning" style="font-size:.9rem;"></div>
                                <div class="text-white-50" style="font-size:.75rem;">
                                    <img src="https://img3.doubanio.com/favicon.ico" style="width:14px;height:14px;margin-right:3px;" onerror="this.style.display='none'">
                                    豆瓣 <span id="douban-votes"></span>人评价
                                </div>
                            </div>
                            <div class="vr bg-secondary" style="height:50px;"></div>
                            <div class="small text-white-50" id="movie-extra"></div>
                        </div>
                        <!-- 简介 -->
                        <p id="movie-description" class="text-white-50 small lh-lg" style="overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;"></p>
                    </div>
                    <!-- 操作按钮 -->
                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <button id="like-btn" class="btn btn-outline-danger btn-sm px-3" onclick="toggleLike()">
                            <i class="fas fa-heart me-1"></i><span id="like-text">点赞</span>
                            <span class="badge bg-danger ms-1" id="like-count-badge">0</span>
                        </button>
                        <button id="favorite-btn" class="btn btn-outline-warning btn-sm px-3" onclick="toggleFavorite()">
                            <i class="fas fa-star me-1"></i><span id="favorite-text">收藏</span>
                        </button>
                        <a href="/" class="btn btn-outline-light btn-sm px-3">
                            <i class="fas fa-arrow-left me-1"></i>返回首页
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 简介展开 + 评论 -->
        <div class="row">
            <div class="col-md-8">
                <!-- 完整简介 -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white fw-bold">
                        <i class="fas fa-align-left me-2 text-primary"></i>剧情简介
                    </div>
                    <div class="card-body">
                        <p id="movie-description-full" class="lh-lg text-secondary mb-0"></p>
                    </div>
                </div>
                <!-- 评论区 -->
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold">
                        <i class="fas fa-comments me-2 text-success"></i>
                        全部评论 <span class="badge bg-success ms-1" id="comments-count">0</span>
                    </div>
                    <div class="card-body">
                        <!-- 发表评论 -->
                        <div class="mb-4">
                            <div class="d-flex gap-2">
                                <div style="width:36px;height:36px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <i class="fas fa-user text-white" style="font-size:.8rem;"></i>
                                </div>
                                <div class="flex-fill">
                                    <textarea class="form-control border-0 bg-light" id="comment-input" rows="3" 
                                              placeholder="写下你对这部影片的看法…（请遵守社区规范，禁止政治话题）"></textarea>
                                    <div class="d-flex justify-content-end mt-2">
                                        <button class="btn btn-primary btn-sm px-4" onclick="submitComment()">
                                            <i class="fas fa-paper-plane me-1"></i>发表
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- 评论列表 -->
                        <div id="comments-list">
                            <div class="text-center text-muted py-4">
                                <i class="fas fa-spinner fa-spin fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：详细信息 -->
            <div class="col-md-4">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-white fw-bold">
                        <i class="fas fa-info-circle me-2 text-info"></i>影片信息
                    </div>
                    <ul class="list-group list-group-flush" id="movie-info-list">
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let movieId = new URLSearchParams(window.location.search).get('id');
    let currentMovie = null;
    const token = localStorage.getItem('token');

    // 渲染星星
    function renderStars(score) {
        if (!score) return '';
        const full = Math.floor(score / 2);
        const half = score % 2 >= 1 ? 1 : 0;
        const empty = 5 - full - half;
        return '<i class="fas fa-star"></i>'.repeat(full)
             + (half ? '<i class="fas fa-star-half-alt"></i>' : '')
             + '<i class="far fa-star"></i>'.repeat(empty);
    }

    async function loadMovieDetail() {
        if (!movieId) {
            document.getElementById('loading-placeholder').innerHTML =
                '<div class="alert alert-danger">无效的影视剧ID</div>';
            return;
        }
        try {
            const res = await fetch(`/api/movie/${movieId}`);
            if (!res.ok) throw new Error('影视剧不存在');
            currentMovie = await res.json();

            // 海报
            const poster = currentMovie.poster_url && currentMovie.poster_url.startsWith('http')
                ? currentMovie.poster_url : '';
            document.getElementById('movie-poster').src = poster;
            document.getElementById('movie-poster').alt = currentMovie.title;

            // 标题 & meta
            document.title = currentMovie.title + ' - 影视剧论坛';
            document.getElementById('movie-title').textContent = currentMovie.title;
            const typeLabel = currentMovie.is_series ? '剧集' : '电影';
            document.getElementById('movie-meta').textContent =
                `${currentMovie.year || ''}年 · ${currentMovie.country || ''} · ${currentMovie.genre || ''} · ${typeLabel}`;

            // 豆瓣评分
            if (currentMovie.douban_score) {
                document.getElementById('douban-score').textContent = currentMovie.douban_score.toFixed(1);
                document.getElementById('stars-row').innerHTML = renderStars(currentMovie.douban_score);
                document.getElementById('douban-votes').textContent =
                    currentMovie.douban_votes ? currentMovie.douban_votes : '';
            } else {
                document.getElementById('score-block').innerHTML =
                    '<span class="text-white-50 small">暂无评分</span>';
            }

            // 导演/主演/片长
            const extras = [];
            if (currentMovie.director) extras.push(`<div><span class="text-white-50">导演：</span>${currentMovie.director}</div>`);
            if (currentMovie.cast) extras.push(`<div><span class="text-white-50">主演：</span>${currentMovie.cast}</div>`);
            if (currentMovie.duration) extras.push(`<div><span class="text-white-50">片长：</span>${currentMovie.duration}</div>`);
            document.getElementById('movie-extra').innerHTML = extras.join('');

            // 简介
            document.getElementById('movie-description').textContent = currentMovie.description || '暂无简介';
            document.getElementById('movie-description-full').textContent = currentMovie.description || '暂无简介';

            // 评论数
            document.getElementById('comments-count').textContent = currentMovie.comments_count || 0;
            // 点赞数
            document.getElementById('like-count-badge').textContent = currentMovie.likes_count || 0;

            // 右侧详细信息列表
            const infoItems = [
                ['fa-calendar', '上映年份', currentMovie.year ? currentMovie.year + '年' : '—'],
                ['fa-globe', '国家/地区', currentMovie.country || '—'],
                ['fa-theater-masks', '题材类型', currentMovie.genre || '—'],
                ['fa-film', '类别', typeLabel],
                ['fa-clock', '时长/集数', currentMovie.duration || '—'],
                ['fa-user-tie', '导演', currentMovie.director || '—'],
                ['fa-users', '主演', currentMovie.cast || '—'],
            ];
            document.getElementById('movie-info-list').innerHTML = infoItems.map(([icon, label, val]) =>
                `<li class="list-group-item d-flex gap-2 align-items-start py-2">
                    <i class="fas ${icon} text-secondary mt-1" style="width:16px;"></i>
                    <div class="flex-fill">
                        <div class="text-muted" style="font-size:.75rem;">${label}</div>
                        <div class="small fw-medium">${val}</div>
                    </div>
                </li>`).join('');

            // 加载点赞/收藏状态
            if (token) loadUserStatus();

            // 显示主体
            document.getElementById('loading-placeholder').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            loadComments();
        } catch (e) {
            document.getElementById('loading-placeholder').innerHTML =
                `<div class="alert alert-danger">加载失败：${e.message}</div>
                 <a href="/" class="btn btn-outline-secondary btn-sm">返回首页</a>`;
        }
    }

    async function loadUserStatus() {
        try {
            const res = await fetch(`/api/movie/${movieId}/status`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            // 点赞状态
            if (data.liked) setLiked(true);
            // 收藏状态
            if (data.favorited) setFavorited(true);
            // 更新点赞数
            document.getElementById('like-count-badge').textContent = data.likes_count || 0;
        } catch(e) {}
    }

    function setLiked(liked) {
        const btn = document.getElementById('like-btn');
        if (liked) {
            btn.classList.remove('btn-outline-danger');
            btn.classList.add('btn-danger');
            document.getElementById('like-text').textContent = '已点赞';
        } else {
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-outline-danger');
            document.getElementById('like-text').textContent = '点赞';
        }
    }

    function setFavorited(favorited) {
        const btn = document.getElementById('favorite-btn');
        if (favorited) {
            btn.classList.remove('btn-outline-warning');
            btn.classList.add('btn-warning');
            document.getElementById('favorite-text').textContent = '已收藏';
        } else {
            btn.classList.remove('btn-warning');
            btn.classList.add('btn-outline-warning');
            document.getElementById('favorite-text').textContent = '收藏';
        }
    }

    async function toggleLike() {
        if (!token) { alert('请先登录'); window.location.href = '/login'; return; }
        try {
            const res = await fetch(`/api/movie/${movieId}/like`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) {
                const liked = data.status === 'liked';
                setLiked(liked);
                // 更新点赞数
                const badge = document.getElementById('like-count-badge');
                badge.textContent = parseInt(badge.textContent || 0) + (liked ? 1 : -1);
            } else {
                alert(data.error || '操作失败');
            }
        } catch(e) { alert('网络错误，请重试'); }
    }

    async function toggleFavorite() {
        if (!token) { alert('请先登录'); window.location.href = '/login'; return; }
        try {
            const res = await fetch(`/api/movie/${movieId}/favorite`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) {
                setFavorited(data.status === 'favorited');
                const msg = data.status === 'favorited' ? '✅ 收藏成功！可在个人中心查看' : '❎ 已取消收藏';
                showToast(msg);
            } else {
                alert(data.error || '操作失败');
            }
        } catch(e) { alert('网络错误，请重试'); }
    }

    async function loadComments() {
        try {
            const res = await fetch(`/api/movie/${movieId}/comments`);
            const comments = await res.json();
            document.getElementById('comments-count').textContent = comments.length;
            const container = document.getElementById('comments-list');
            if (comments.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-comment-slash fa-2x mb-2 d-block"></i>暂无评论，快来抢沙发！</div>';
                return;
            }
            container.innerHTML = comments.map(c => `
                <div class="d-flex gap-3 mb-4">
                    <div style="width:36px;height:36px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="fas fa-user text-white" style="font-size:.8rem;"></i>
                    </div>
                    <div class="flex-fill">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="fw-bold small">${c.username}</span>
                            <small class="text-muted">${c.created_at}</small>
                        </div>
                        <div class="bg-light rounded p-3 small lh-lg">${c.content}</div>
                    </div>
                </div>`).join('');
        } catch(e) {
            document.getElementById('comments-list').innerHTML = '<div class="alert alert-danger">评论加载失败</div>';
        }
    }

    async function submitComment() {
        if (!token) { alert('请先登录'); window.location.href = '/login'; return; }
        const content = document.getElementById('comment-input').value.trim();
        if (!content) { alert('评论内容不能为空'); return; }
        try {
            const res = await fetch(`/api/movie/${movieId}/comment`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ content })
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('comment-input').value = '';
                loadComments();
                showToast('✅ 评论发表成功！');
            } else {
                alert(data.error || '发表失败');
            }
        } catch(e) { alert('网络错误，请重试'); }
    }

    // 简易 toast 提示
    function showToast(msg) {
        let t = document.getElementById('_toast');
        if (!t) {
            t = document.createElement('div');
            t.id = '_toast';
            t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:24px;font-size:.9rem;z-index:9999;transition:opacity .4s;';
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2500);
    }

    document.addEventListener('DOMContentLoaded', loadMovieDetail);
</script>
{% endblock %}
