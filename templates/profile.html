{% extends "base.html" %}

{% block content %}
<div id="auth-check" class="text-center py-5">
    <i class="fas fa-spinner fa-spin fa-2x text-primary"></i>
    <p class="mt-2 text-muted">验证登录状态...</p>
</div>

<div id="profile-body" style="display:none" class="row">
    <!-- 左侧：用户信息 -->
    <div class="col-md-3 mb-4">
        <!-- 用户卡片 -->
        <div class="card shadow-sm mb-3">
            <div class="card-body text-center pt-4">
                <div class="mx-auto mb-3" style="width:72px;height:72px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-user fa-2x text-white"></i>
                </div>
                <h5 class="mb-0 fw-bold" id="profile-username">—</h5>
                <p class="text-muted small mb-1" id="profile-email"></p>
                <span class="badge mb-2" id="profile-role"></span>
                <p class="text-muted small mb-3">注册于 <span id="profile-created"></span></p>
                <a href="/" class="btn btn-outline-secondary btn-sm w-100 mb-1">
                    <i class="fas fa-home me-1"></i>返回首页
                </a>
                <div id="admin-entry"></div>
            </div>
        </div>
        <!-- 导航 -->
        <div class="card shadow-sm">
            <div class="list-group list-group-flush rounded">
                <button class="list-group-item list-group-item-action active" id="tab-btn-favorites" onclick="showTab('favorites')">
                    <i class="fas fa-star me-2 text-warning"></i>我的收藏
                    <span class="badge bg-warning text-dark float-end" id="fav-count">0</span>
                </button>
                <button class="list-group-item list-group-item-action" id="tab-btn-likes" onclick="showTab('likes')">
                    <i class="fas fa-heart me-2 text-danger"></i>我的点赞
                    <span class="badge bg-danger float-end" id="like-count">0</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 右侧：内容区 -->
    <div class="col-md-9">
        <!-- 收藏列表 -->
        <div id="tab-favorites">
            <div class="d-flex align-items-center mb-3">
                <h5 class="mb-0 fw-bold"><i class="fas fa-star text-warning me-2"></i>我的收藏</h5>
                <span class="badge bg-warning text-dark ms-2" id="fav-count2">0</span>
            </div>
            <div id="favorites-container">
                <div class="text-center text-muted py-5"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
            </div>
        </div>

        <!-- 点赞列表 -->
        <div id="tab-likes" style="display:none">
            <div class="d-flex align-items-center mb-3">
                <h5 class="mb-0 fw-bold"><i class="fas fa-heart text-danger me-2"></i>我的点赞</h5>
                <span class="badge bg-danger ms-2" id="like-count2">0</span>
            </div>
            <div id="likes-container">
                <div class="text-center text-muted py-5"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');

    // 渲染评分
    function scoreSpan(score) {
        if (!score) return '';
        let cls = score >= 9 ? 'bg-success' : score >= 8 ? 'bg-warning text-dark' : 'bg-secondary';
        return `<span class="badge ${cls}"><i class="fas fa-star me-1" style="font-size:.65rem"></i>${score.toFixed(1)}</span>`;
    }

    // 若未登录，直接跳转
    if (!token) {
        window.location.href = '/login?next=/profile';
    }

    function showTab(tab) {
        document.getElementById('tab-favorites').style.display = tab === 'favorites' ? 'block' : 'none';
        document.getElementById('tab-likes').style.display     = tab === 'likes'     ? 'block' : 'none';
        document.getElementById('tab-btn-favorites').classList.toggle('active', tab === 'favorites');
        document.getElementById('tab-btn-likes').classList.toggle('active', tab === 'likes');
    }

    function movieCard(movie, dateKey, dateLabel) {
        const poster = movie.poster_url && movie.poster_url.startsWith('http') ? movie.poster_url
            : `https://ui-avatars.com/api/?name=${encodeURIComponent(movie.title)}&size=300&background=667eea&color=fff&bold=true&length=4`;
        return `
            <div class="col-md-6 col-lg-4 mb-3">
                <div class="card movie-card h-100">
                    <div style="height:180px;overflow:hidden;position:relative;">
                        <img src="${poster}" class="w-100 h-100" alt="${movie.title}" style="object-fit:cover;"
                             onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(movie.title)}&size=300&background=667eea&color=fff&bold=true'">
                        <div style="position:absolute;top:6px;left:6px;">${scoreSpan(movie.douban_score)}</div>
                    </div>
                    <div class="card-body pb-2">
                        <h6 class="card-title fw-bold mb-1">${movie.title}</h6>
                        <p class="text-muted small mb-1">
                            ${movie.year ? movie.year + '年' : ''} · ${movie.country || ''} · ${movie.genre || ''}
                        </p>
                    </div>
                    <div class="card-footer bg-transparent d-flex justify-content-between align-items-center">
                        <small class="text-muted">${dateLabel}：${movie[dateKey]}</small>
                        <a href="/movie?id=${movie.id}" class="btn btn-sm btn-outline-primary">查看</a>
                    </div>
                </div>
            </div>`;
    }

    async function loadProfile() {
        try {
            const res = await fetch('/api/user/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) {
                localStorage.clear();
                window.location.href = '/login';
                return;
            }
            const data = await res.json();
            document.getElementById('profile-username').textContent = data.username;
            document.getElementById('profile-email').textContent = data.email;
            document.getElementById('profile-created').textContent = data.created_at;

            const roleMap   = {admin:'管理员', user:'普通用户', banned:'已封禁'};
            const roleClass = {admin:'bg-danger', user:'bg-primary', banned:'bg-secondary'};
            const roleEl = document.getElementById('profile-role');
            roleEl.textContent  = roleMap[data.role] || data.role;
            roleEl.className    = `badge ${roleClass[data.role] || 'bg-secondary'}`;

            if (data.role === 'admin') {
                document.getElementById('admin-entry').innerHTML =
                    '<a href="/admin" class="btn btn-danger btn-sm w-100 mt-1"><i class="fas fa-shield-alt me-1"></i>管理后台</a>';
            }

            // 显示主体
            document.getElementById('auth-check').style.display = 'none';
            document.getElementById('profile-body').style.display = '';
        } catch(e) {
            localStorage.clear();
            window.location.href = '/login';
        }
    }

    async function loadFavorites() {
        try {
            const res = await fetch('/api/user/favorites', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const list = await res.json();
            document.getElementById('fav-count').textContent = list.length;
            document.getElementById('fav-count2').textContent = list.length;
            const container = document.getElementById('favorites-container');
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-star fa-3x mb-3 d-block text-warning opacity-50"></i>
                        <p>还没有收藏任何影视剧</p>
                        <a href="/" class="btn btn-outline-primary btn-sm">去发现好片</a>
                    </div>`;
                return;
            }
            container.innerHTML = '<div class="row">' + list.map(m => movieCard(m, 'favorited_at', '收藏于')).join('') + '</div>';
        } catch(e) {
            document.getElementById('favorites-container').innerHTML = '<div class="alert alert-danger">加载失败，请刷新重试</div>';
        }
    }

    async function loadLikes() {
        try {
            const res = await fetch('/api/user/likes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const list = await res.json();
            document.getElementById('like-count').textContent = list.length;
            document.getElementById('like-count2').textContent = list.length;
            const container = document.getElementById('likes-container');
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-heart fa-3x mb-3 d-block text-danger opacity-50"></i>
                        <p>还没有点赞任何影视剧</p>
                        <a href="/" class="btn btn-outline-primary btn-sm">去发现好片</a>
                    </div>`;
                return;
            }
            container.innerHTML = '<div class="row">' + list.map(m => movieCard(m, 'liked_at', '点赞于')).join('') + '</div>';
        } catch(e) {
            document.getElementById('likes-container').innerHTML = '<div class="alert alert-danger">加载失败，请刷新重试</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadProfile();
        loadFavorites();
        loadLikes();
    });
</script>
{% endblock %}
